
# Configuracion del Servidor
spring.application.name=descubresv
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Base de Datos PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/descubresv_db}
spring.datasource.username=${DB_USERNAME:descubresv_user}
spring.datasource.password=${DB_PASSWORD:descubresv_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones 
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuracion JWT
# Clave secreta en Base64 
jwt.secret=${JWT_SECRET:ZGVzY3VicmVzdl9zZWNyZXRfa2V5X3N1cGVyX3NlZ3VyYV8yMDI2X3Byb3llY3Rv}
# Tiempo de expiracion 24 horas
jwt.expiration=${JWT_EXPIRATION:86400000}
# Nombre de la cookie donde se almacena el JWT
jwt.cookie-name=jwt_token

# Swagger 
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Paginacion por defecto
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50
spring.data.web.pageable.one-indexed-parameters=false

# CORS - Origenes permitidos para React
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
